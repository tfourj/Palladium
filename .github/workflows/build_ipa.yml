name: Build Palladium .ipa (Unsigned)

on:
  push:
    branches: [main]
    paths:
      - "Palladium/**"
      - "Palladium.xcodeproj/project.pbxproj"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      PYTHON_APPLE_SUPPORT_REPO: beeware/Python-Apple-support
      PYTHON_APPLE_SUPPORT_TAG: latest
      SWIFTFFMPEG_IOS_REPO: tfourj/SwiftFFmpeg-iOS
      SWIFTFFMPEG_IOS_ASSET: SwiftFFmpeg-iOS.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Download Python Apple Support
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        if [ "$PYTHON_APPLE_SUPPORT_TAG" = "latest" ]; then
          RELEASE_API="https://api.github.com/repos/$PYTHON_APPLE_SUPPORT_REPO/releases/latest"
        else
          RELEASE_API="https://api.github.com/repos/$PYTHON_APPLE_SUPPORT_REPO/releases/tags/$PYTHON_APPLE_SUPPORT_TAG"
        fi

        TMP_DIR=$(mktemp -d)
        RELEASE_JSON_PATH="$TMP_DIR/release.json"
        echo "Fetching release metadata from: $RELEASE_API"
        curl -fsSL \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          "$RELEASE_API" \
          -o "$RELEASE_JSON_PATH"

        ASSET_URL=$(python3 -c 'import json,re,sys; payload=json.load(open(sys.argv[1], encoding="utf-8")); pattern=re.compile(r"iOS-support.*\.tar\.gz$"); print(next((asset.get("browser_download_url","") for asset in payload.get("assets", []) if pattern.search(str(asset.get("name","")))), ""))' "$RELEASE_JSON_PATH")

        if [ -z "$ASSET_URL" ]; then
          echo "❌ Could not find iOS support archive in release assets."
          python3 -c 'import json,sys; payload=json.load(open(sys.argv[1], encoding="utf-8")); [print(asset.get("name","")) for asset in payload.get("assets", [])]' "$RELEASE_JSON_PATH"
          exit 1
        fi

        echo "Downloading: $ASSET_URL"
        ARCHIVE_PATH="$TMP_DIR/python-apple-support.tar.gz"
        curl -fL "$ASSET_URL" -o "$ARCHIVE_PATH"

        EXTRACT_DIR="$TMP_DIR/extracted"
        mkdir -p "$EXTRACT_DIR"
        tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_DIR"

        XCFRAMEWORK_PATH=$(find "$EXTRACT_DIR" -type d -name "Python.xcframework" | head -n 1)
        if [ -z "$XCFRAMEWORK_PATH" ]; then
          echo "❌ Python.xcframework not found in extracted archive."
          find "$EXTRACT_DIR" -maxdepth 3 -type d
          exit 1
        fi

        rm -rf "$GITHUB_WORKSPACE/Python.xcframework"
        cp -R "$XCFRAMEWORK_PATH" "$GITHUB_WORKSPACE/Python.xcframework"

        echo "✅ Installed Python.xcframework:"
        ls -la "$GITHUB_WORKSPACE/Python.xcframework"

    - name: Download SwiftFFmpeg-iOS
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        RELEASE_API="https://api.github.com/repos/$SWIFTFFMPEG_IOS_REPO/releases/latest"
        TMP_DIR=$(mktemp -d)
        RELEASE_JSON_PATH="$TMP_DIR/release.json"
        EXTRACT_DIR="$TMP_DIR/extracted"
        TARGET_DIR="$GITHUB_WORKSPACE/../SwiftFFmpeg-iOS"

        echo "Fetching release metadata from: $RELEASE_API"
        curl -fsSL \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          "$RELEASE_API" \
          -o "$RELEASE_JSON_PATH"

        ASSET_URL=$(python3 -c 'import json,sys; payload=json.load(open(sys.argv[1], encoding="utf-8")); asset_name=sys.argv[2]; print(next((asset.get("browser_download_url","") for asset in payload.get("assets", []) if asset.get("name","") == asset_name), ""))' "$RELEASE_JSON_PATH" "$SWIFTFFMPEG_IOS_ASSET")

        if [ -z "$ASSET_URL" ]; then
          echo "❌ Could not find $SWIFTFFMPEG_IOS_ASSET in the latest SwiftFFmpeg-iOS release."
          python3 -c 'import json,sys; payload=json.load(open(sys.argv[1], encoding="utf-8")); [print(asset.get("name","")) for asset in payload.get("assets", [])]' "$RELEASE_JSON_PATH"
          exit 1
        fi

        echo "Downloading: $ASSET_URL"
        ARCHIVE_PATH="$TMP_DIR/$SWIFTFFMPEG_IOS_ASSET"
        curl -fL "$ASSET_URL" -o "$ARCHIVE_PATH"

        mkdir -p "$EXTRACT_DIR"
        unzip -q "$ARCHIVE_PATH" -d "$EXTRACT_DIR"

        SOURCE_DIR=""
        if [ -d "$EXTRACT_DIR/SwiftFFmpeg-iOS" ]; then
          SOURCE_DIR="$EXTRACT_DIR/SwiftFFmpeg-iOS"
        else
          SOURCE_DIR=$(find "$EXTRACT_DIR" -maxdepth 2 -type f -name "Package.swift" -exec dirname {} \; | head -n 1)
        fi

        if [ -z "$SOURCE_DIR" ] || [ ! -d "$SOURCE_DIR" ]; then
          echo "❌ Could not locate extracted SwiftFFmpeg-iOS folder."
          find "$EXTRACT_DIR" -maxdepth 3 -print
          exit 1
        fi

        rm -rf "$TARGET_DIR"
        cp -R "$SOURCE_DIR" "$TARGET_DIR"

        echo "✅ Installed SwiftFFmpeg-iOS:"
        ls -la "$TARGET_DIR"

    - name: Set up Xcode 26.2
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.2"

    - name: Show Xcode Version
      run: xcodebuild -version

    - name: Show Swift Version
      run: swift --version

    - name: Make script executable
      run: chmod +x build_ipa.sh

    - name: Build IPA
      env:
        PALLADIUM_DISABLE_PYTHON_DYLIB_CODESIGN: "1"
      run: ./build_ipa.sh

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: Palladium
        path: build/*.ipa
